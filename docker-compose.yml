services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: claudewebapp
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      target: runtime
    ports:
      - "8080:8080"
    environment:
      MYSQL_CONNECTION: "Server=mysql;Database=claudewebapp;User=root;Password=root;"
      REDIS_CONNECTION: "redis:6379"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  test:
    build:
      context: .
      target: test
    environment:
      TEST_MYSQL_CONNECTION: "Server=mysql;User=root;Password=root;"
    depends_on:
      mysql:
        condition: service_healthy
